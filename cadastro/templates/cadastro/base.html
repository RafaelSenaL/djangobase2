<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ sitename }} - {% block titulo %}{% endblock %}</title>
</head>
<body>

    <header>
        <h1>{{ sitename }}</h1>
    </header>

    <hr>

    <nav>
        <a href="/">Início</a> |
        <a href="/contato/">Contato</a>
        <a href="/adicionar/">Adicionar</a>
    </nav>

    <hr>

    <main>
        {% block conteudo %}{% endblock %}
    </main>

    <hr>
    <footer>
        <p>&copy; 2026 {{ dono | default:"Visitante" }}</p>
    </footer>

</body>
</html>
